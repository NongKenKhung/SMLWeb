services:
  postgres:
    image: postgres:16-alpine
    container_name: sml_postgres
    restart: unless-stopped
    # Credentials MUST come from .env — no insecure defaults baked in.
    # Required keys in `.env` at project root:
    #   POSTGRES_USER       (e.g. smluser)
    #   POSTGRES_PASSWORD   (anything strong; no default to force the user to set one)
    #   POSTGRES_DB         (e.g. smartcitylab)
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:?required — set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required — set in .env}
      POSTGRES_DB:       ${POSTGRES_DB:?required — set in .env}
      LANG: en_US.utf8
    # Bind to loopback only — DB not exposed on LAN. Use `docker compose exec
    # postgres psql ...` or pgAdmin (also localhost-only) for admin access.
    # If you genuinely need remote access, change to "0.0.0.0:5432:5432" AND
    # set a strong POSTGRES_PASSWORD in .env first.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8.12
    container_name: sml_pgadmin
    restart: unless-stopped
    # pgAdmin credentials also from .env — no admin/admin default.
    #   PGADMIN_DEFAULT_EMAIL    (e.g. you@example.com)
    #   PGADMIN_DEFAULT_PASSWORD (strong password)
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_DEFAULT_EMAIL:?required — set in .env}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?required — set in .env}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    # pgAdmin also bound to loopback. Tunnel via SSH or VPN for remote admin.
    ports:
      - "127.0.0.1:5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy

  # Main Node.js app — depends on postgres being healthy.
  app:
    build: .
    image: sml-web:latest
    container_name: sml_app
    restart: unless-stopped
    # Defaults below are baseline; .env (if present) is loaded by Compose for
    # secrets like SMTP_PASS and overrides via the `environment:` block below.
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://smluser:smlpass@postgres:5432/smartcitylab
      TRUST_PROXY: 1
      TOKEN_FILE: /data/.tokens.json
      TOKEN_TTL_DAYS: 30
      # SMTP_* vars are pulled from .env on host (so secrets stay out of compose file)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      # Speech-to-text + AI summary — ปิดใช้งานชั่วคราว (asr + ollama services
      # ถูก comment ออกด้านล่าง). To re-enable: uncomment asr + ollama blocks
      # below + rebuild (`docker compose build asr && docker compose up -d`) +
      # set ASR_URL to http://asr:8000 here
      ASR_URL: ""
    ports:
      - "3000:3000"
    volumes:
      - app_state:/data
      - ./uploads:/app/uploads
      # ── NAS storage (UGREEN DH4300 Plus via NFS) — prepared, NOT active ──
      # To switch to NAS-backed storage:
      #   1. Comment out the `./uploads:/app/uploads` line above
      #   2. Uncomment the line below
      #   3. Do the same on the `asr` service (read-only mount)
      #   4. Edit `sml_uploads` driver_opts at the bottom (real NAS IP + path)
      #   5. docker compose down && docker compose up -d
      # - sml_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  # ── WhisperX microservice (Python + Flask) ─────────────────────────────
  # ════════════════════════════════════════════════════════════════════════
  # AI services (asr + ollama) — DISABLED ตามคำขอ user เพื่อ reclaim disk +
  # vRAM. To re-enable:
  #   1) Uncomment ทั้ง 2 block ด้านล่าง (asr + ollama)
  #   2) Uncomment asr_cache + ollama_models ใน volumes ตอนท้าย
  #   3) Set `ASR_URL: http://asr:8000` ใน app service env (บรรทัด 79)
  #   4) `docker compose build asr && docker compose up -d`
  # Code + uploaded recordings ยังอยู่ครบ — แค่ไม่ run process AI
  # ════════════════════════════════════════════════════════════════════════
  #
  # ── ASR (WhisperX speech-to-text) ──
  # asr:
  #   build: ./asr-service
  #   image: sml-asr:latest
  #   container_name: sml_asr
  #   restart: unless-stopped
  #   environment:
  #     UPLOAD_DIR: /uploads
  #     WHISPER_MODEL: ${WHISPER_MODEL:-large-v3}
  #     WHISPER_DEVICE: ${WHISPER_DEVICE:-cuda}
  #     WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-float16}
  #     WHISPER_LANG: ${WHISPER_LANG:-th}
  #     WHISPER_ALIGN: ${WHISPER_ALIGN:-1}
  #     WHISPER_BATCH_SIZE: ${WHISPER_BATCH_SIZE:-8}
  #     WHISPER_ALIGN_MODEL: ${WHISPER_ALIGN_MODEL:-airesearch/wav2vec2-large-xlsr-53-th}
  #     OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
  #     OLLAMA_MODEL: ${OLLAMA_MODEL:-scb10x/llama3.2-typhoon2-3b-instruct}
  #   volumes:
  #     - ./uploads:/uploads:ro
  #     - asr_cache:/cache
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]
  #
  # ── Ollama (local LLM for AI organisation) ──
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: sml_ollama
  #   restart: unless-stopped
  #   volumes:
  #     - ollama_models:/root/.ollama
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]

volumes:
  pg_data:
  pgadmin_data:
  app_state:
  # asr_cache:      # uncomment เมื่อ re-enable asr service
  # ollama_models:  # uncomment เมื่อ re-enable ollama service

  # ── NAS-backed uploads volume (UGREEN NASync DH4300 Plus, NFSv4) ────────
  # Prepared for future cutover; currently unused (see commented-out mounts
  # on `app` and `asr` services). Defining the volume here is safe — Docker
  # only attempts the NFS mount when a container actually references it, so
  # this block can sit dormant indefinitely without hitting the NAS.
  #
  # On the NAS (UGOS Pro):
  #   Storage Manager → create RAID 1/5/6 pool → Btrfs volume
  #   Shared Folder → create `sml-uploads` → enable Snapshot
  #   File Services → NFS → enable NFSv4
  #   Shared Folder → sml-uploads → NFS Permissions →
  #     Hostname/IP = Docker host IP (or subnet)
  #     Privilege   = Read/Write
  #     Squash      = Map root to admin
  #     Security    = sys
  #
  # Replace `192.168.1.50` and `/volume1/sml-uploads` with the values UGOS
  # Pro shows in the NFS Permissions dialog before activating.
  sml_uploads:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=192.168.1.50,nfsvers=4,rw,soft,timeo=30,nolock"
      device: ":/volume1/sml-uploads"

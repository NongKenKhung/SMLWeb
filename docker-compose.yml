services:
  postgres:
    image: postgres:16-alpine
    container_name: sml_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: smluser
      POSTGRES_PASSWORD: smlpass
      POSTGRES_DB: smartcitylab
      LANG: en_US.utf8
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smluser -d smartcitylab"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8.12
    container_name: sml_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy

  # Main Node.js app — depends on postgres being healthy.
  app:
    build: .
    image: sml-web:latest
    container_name: sml_app
    restart: unless-stopped
    # Defaults below are baseline; .env (if present) is loaded by Compose for
    # secrets like SMTP_PASS and overrides via the `environment:` block below.
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://smluser:smlpass@postgres:5432/smartcitylab
      TRUST_PROXY: 1
      TOKEN_FILE: /data/.tokens.json
      TOKEN_TTL_DAYS: 30
      # SMTP_* vars are pulled from .env on host (so secrets stay out of compose file)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      # Speech-to-text (PyThaiASR) microservice. Server reaches it via the
      # compose network DNS. Set to empty to disable transcription cleanly.
      ASR_URL: http://asr:8000
    ports:
      - "3000:3000"
    volumes:
      - app_state:/data
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  # ── PyThaiASR microservice (Python + Flask) ────────────────────────────
  # Wraps github.com/PyThaiNLP/pythaiasr. Mounts the same `uploads` volume
  # read-only so the app can hand it a filename instead of re-uploading.
  # First boot pulls ~1.2GB of model weights into the cache volume; subsequent
  # restarts are fast. ASR is optional — server.js silently skips transcription
  # if this container is down.
  asr:
    build: ./asr-service
    image: sml-asr:latest
    container_name: sml_asr
    restart: unless-stopped
    environment:
      UPLOAD_DIR: /uploads
    volumes:
      - ./uploads:/uploads:ro
      - asr_cache:/cache
    # Uncomment to expose for direct curl tests (otherwise only `app` reaches it)
    # ports: ["8000:8000"]

volumes:
  pg_data:
  pgadmin_data:
  app_state:
  asr_cache:
